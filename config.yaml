system:
  log_level: "DEBUG"

cameras:
  dms:
    source: 1      # this is your laptop camera on your system
    width: 640
    height: 480
    fps: 30
  road:
    source: 0      # this is your USB webcam on your system
    width: 640
    height: 480
    fps: 30

dms:
  backend: "mediapipe"
  ear:
    threshold: 0.30       # pre-calibration fallback; auto-cal overrides this
    consec_frames: 20     # 20 fr = 667ms sustained closure → DROWSY
  mar:
    threshold: 0.50       # updated for corrected 6-pt MAR scale (was 0.75 on bogus scale)
    consec_frames: 12     # 12 fr = 400ms sustained yawn → FATIGUED
  head_pose:
    yaw_limit: 30
    pitch_limit: 20
    consec_frames: 8      # NEW: 8 fr = 267ms sustained deviation → DISTRACTED
  weights:
    ear: 0.45
    mar: 0.25
    head: 0.30

road:
  model_path: "models/yolov8n_rdd_india.pt"
  confidence_threshold: 0.50
  classes:
    0: "pothole"
    1: "crack_longitudinal"
    2: "crack_transverse"
    3: "rutting"
    4: "repair"
  severity:
    minor:
      area_px2_max: 3000
    moderate:
      area_px2_max: 10000

gps:
  enabled: true
  simulation: true
  port: "COM3"
  baud: 9600

alert:
  buzzer_gpio_pin: null
  audio_alert: false
  dashboard_host: "0.0.0.0"
  dashboard_port: 5000
  risk_levels:
    low: 0.35
    moderate: 0.65

database:
  path: "data/logs/driver_guard_events.db"
  flush_interval: 5